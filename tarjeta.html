<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alonso Curiel — Laboratorio Artesano</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ── Page background shapes ── -->
  <div class="bg-shapes" aria-hidden="true">
    <div class="bg-circle bg-c1"></div>
    <div class="bg-circle bg-c2"></div>
    <div class="bg-circle bg-c3"></div>
    <div class="bg-circle bg-c4"></div>
    <div class="bg-circle bg-c5"></div>
    <div class="bg-circle bg-c6"></div>
    <div class="bg-circle filled bg-c7"></div>
    <div class="bg-circle filled bg-dot"></div>
    <div class="bg-circle filled bg-dot2"></div>
  </div>

  <!-- ── Card ── -->
  <div class="card-wrap">
    <div class="card">

      <!-- Top dark panel -->
      <div class="top">
        <div class="top-circle-extra"></div>
        <div class="top-inner">

          <div class="company-tag">
            <div class="company-dot"></div>
            <span class="company-name">Laboratorio Artesano</span>
          </div>

          <h1 class="name">Alonso<br><em>Curiel</em></h1>

          <div class="gold-rule"></div>
          <p class="job-title">Director Comercial</p>

        </div>
      </div>

      <!-- Bottom white panel -->
      <div class="bottom">

        <div class="contact-list">
          <a class="contact-row" href="mailto:laboratorioartesano@outlook.com">
            <div class="c-icon">
              <svg viewBox="0 0 24 24">
                <rect x="2" y="4" width="20" height="16" rx="3"/>
                <polyline points="2,4 12,13 22,4"/>
              </svg>
            </div>
            <div class="c-text">
              <span class="c-label">Correo</span>
              <span class="c-value">laboratorioartesano@outlook.com</span>
            </div>
          </a>
        </div>

        <div class="sep"></div>

        <div class="social-row">
          <a class="social-btn" href="https://www.instagram.com/laboratorioartesano" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.334 3.608 1.31.975.975 1.247 2.242 1.31 3.608.058 1.266.069 1.646.069 4.849s-.012 3.584-.07 4.85c-.062 1.366-.334 2.633-1.31 3.608-.975.975-2.242 1.247-3.608 1.31-1.266.058-1.646.069-4.849.069s-3.584-.012-4.85-.07c-1.366-.062-2.633-.334-3.608-1.31-.975-.975-1.247-2.242-1.31-3.608C2.175 15.584 2.163 15.204 2.163 12s.012-3.584.07-4.85c.062-1.366.334-2.633 1.31-3.608.975-.975 2.242-1.247 3.608-1.31C8.416 2.175 8.796 2.163 12 2.163zm0-2.163C8.741 0 8.332.014 7.052.072 5.197.157 3.355.673 2.014 2.014.673 3.355.157 5.197.072 7.052.014 8.332 0 8.741 0 12c0 3.259.014 3.668.072 4.948.085 1.855.601 3.697 1.942 5.038 1.341 1.341 3.183 1.857 5.038 1.942C8.332 23.986 8.741 24 12 24s3.668-.014 4.948-.072c1.855-.085 3.697-.601 5.038-1.942 1.341-1.341 1.857-3.183 1.942-5.038.058-1.28.072-1.689.072-4.948s-.014-3.668-.072-4.948c-.085-1.855-.601-3.697-1.942-5.038C20.645.673 18.803.157 16.948.072 15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
            </svg>
            @laboratorioartesano
          </a>
        </div>

        <div class="card-footer">
          <span class="footer-brand">Laboratorio Artesano</span>
          <div class="footer-dot"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
